version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dclaw_research
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8098:8098"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_research
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dclaw_research
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8098 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3012:3012"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8098
    depends_on:
      - backend

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_research
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dclaw_research
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - postgres
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
