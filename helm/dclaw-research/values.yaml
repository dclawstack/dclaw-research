replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: dclaw-research-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8098

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: research.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

env:
  DATABASE_URL: ""
  REDIS_URL: ""
  FIRECRAWL_API_KEY: ""
  OLLAMA_HOST: ""
